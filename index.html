function calc(){
const t={C:0,S:0,F:0,M:0};
Object.values(S.ans).forEach(s=>{Object.entries(s).forEach(([k,v])=>{t[k]+=v})});
const total=Object.values(t).reduce((a,b)=>a+b,0)||1;
const sorted=Object.entries(t).sort((a,b)=>b[1]-a[1]);
const p=sorted[0],s=sorted[1];
const fus=s[1]>=p[1]*.6;
const opp=p[0]==="C"?"F":p[0]==="F"?"C":p[0]==="S"?"M":"S";
return{t,total,sorted,p,s,fus,opp};
}

["🏃","Ejercicio recomendado","Actividades ideales para tu constitución"],
["⏱️","5 minutos","Todo lo que necesitas para empezar a conocerte"]
].map(([i,t,d])=>`<div class="feat-row"><span class="feat-icon">${i}</span><div><div class="feat-title">${t}</div><div class="feat-desc">${d}</div></div></div>`).join("")}
</div>
<button class="btn-main" onclick="startQuiz()">Empezar el test</button>
<p class="disc" style="margin-top:16px">Basado en medicina Unani (Dr. David Duarte) y RGP Method (Rodrigo García Platas). Test orientativo — no sustituye valoración profesional.</p>
</div>`;
}

function renderQuiz(app){
const q=Q[S.cQ];
const pct=((S.cQ)/Q.length)*100;
app.innerHTML=`<div class="card fade">
<div class="progress-wrap"><div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div><span style="font-size:13px;color:#888;min-width:48px;text-align:right;font-weight:600">${S.cQ+1}/${Q.length}</span></div>
<div class="badge">${q.icon} ${q.cat}</div>
<h2 style="font-size:18px;font-weight:700;line-height:1.4;margin-bottom:20px">${q.q}</h2>
<div style="display:flex;flex-direction:column;gap:10px">
${q.opts.map((o,i)=>`<button class="opt-btn" onclick="answer(${i})">${o.t}</button>`).join("")}
</div>
${S.cQ>0?`<button class="back-btn" onclick="goBack()">← Anterior</button>`:""}
</div>`;
}

function renderResults(app){
const r=calc();
const pk=r.p[0],sk=r.s[0],ok=r.opp;
const p=B[pk],s=B[sk],o=B[ok];
const pF=FOOD[pk],sF=r.fus?FOOD[sk]:null;
const pE=EXER[pk],sE=r.fus?EXER[sk]:null;

let h=`<div class="fade">`;

// === RESULT CARD ===
h+=`<div class="card">
<h1 style="font-size:22px;font-weight:800;text-align:center;margin-bottom:2px">Tu Resultado</h1>
<p style="text-align:center;color:#888;font-size:13px;margin-bottom:20px">Basado en 20 respuestas</p>

<div class="bio-card" style="background:${p.bg};border:2px solid ${p.color}">
<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
<span style="font-size:32px">${p.el}</span>
<div style="flex:1"><div style="font-size:10px;color:${p.color};font-weight:700;text-transform:uppercase;letter-spacing:1.2px">Biotipo dominante</div><div style="font-size:24px;font-weight:800">${p.name}</div></div>
<div style="font-size:24px;font-weight:800;color:${p.color}">${Math.round((r.p[1]/r.total)*100)}%</div>
</div>
<p style="font-size:13px;color:#444;line-height:1.6;margin:0 0 10px">${p.desc}</p>
<div class="grid2">
<div class="grid-cell"><strong style="color:${p.color}">Energía</strong><br>${p.energy}</div>
<div class="grid-cell"><strong style="color:${p.color}">Estación</strong><br>${p.season}</div>
</div>
<div class="grid-cell" style="margin-top:8px"><strong style="color:${p.color}">Fortalezas:</strong> ${p.str}</div>
<div class="grid-cell" style="margin-top:6px"><strong style="color:#999">Sombra:</strong> ${p.shadow}</div>
</div>`;

if(r.fus){
h+=`<div class="bio-card" style="background:${s.bg};border:1.5px solid ${s.color}">
<div style="display:flex;align-items:center;gap:10px">
<span style="font-size:26px">${s.el}</span>
<div style="flex:1"><div style="font-size:10px;color:${s.color};font-weight:700;text-transform:uppercase;letter-spacing:1.2px">Biotipo secundario · Fusión</div><div style="font-size:20px;font-weight:700">${s.name}</div></div>
<div style="font-size:20px;font-weight:800;color:${s.color}">${Math.round((r.s[1]/r.total)*100)}%</div>
</div>
<p style="font-size:12px;color:#555;line-height:1.5;margin:8px 0 0">${s.desc}</p>
</div>`;
}

// Chart
h+=`<div style="background:#f8f9fa;border-radius:14px;padding:16px;margin-bottom:14px">
<div style="font-size:13px;font-weight:700;color:#555;margin-bottom:12px">Distribución completa</div>`;
r.sorted.forEach(([k,v])=>{
const b=B[k],pct=Math.round((v/r.total)*100);
h+=`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:3px"><span style="font-weight:600;color:${b.color}">${b.el} ${b.name}</span><span style="color:#888">${pct}%</span></div><div class="chart-track"><div class="chart-fill" style="width:${pct}%;background:${b.color}"></div></div></div>`;
});
h+=`</div>`;

if(r.fus){
h+=`<div class="info-card" style="background:#fffbe6;border-color:#f0c040;font-size:13px;color:#665500;line-height:1.5"><strong>⚡ Fusión ${p.name}-${s.name}</strong> — Casi nadie es un biotipo puro. Tu biología mezcla rasgos de ambos ejes, y tu personalidad adulta puede estar compensando tu temperamento original.</div>`;
}

h+=`<div class="info-card" style="background:#f0f8ff;border-color:#b8d4e8">
<div style="font-size:13px;font-weight:700;color:#2c5282;margin-bottom:6px">🧭 Camino de compensación (Paso 3 · RGP Method)</div>
<p style="font-size:13px;color:#444;line-height:1.6;margin:0">Tu opuesto es <strong style="color:${o.color}">${o.name} ${o.el}</strong>. Una vez domines tu biología, tu evolución viene de integrar conscientemente las fortalezas de este opuesto: <em>${o.str.toLowerCase()}</em></p>
</div>
</div>`;

// === TABS ===
h+=`<div class="tab-row">
<button class="tab-btn ${S.tab==="resultado"?"on":"off"}" onclick="setTab('resultado')">📊 Resultado</button>
<button class="tab-btn ${S.tab==="alimentacion"?"on":"off"}" onclick="setTab('alimentacion')">🥗 Alimentación</button>
<button class="tab-btn ${S.tab==="ejercicio"?"on":"off"}" onclick="setTab('ejercicio')">🏃 Ejercicio</button>
</div>`;

// === FOOD TAB ===
if(S.tab==="alimentacion"){
h+=`<div class="card fade">
<h2 style="font-size:18px;font-weight:800;margin-bottom:4px">🥗 Tu Alimentación</h2>
<p style="font-size:12px;color:#888;margin-bottom:20px">Recomendaciones para ${p.name}${r.fus?` con fusión ${s.name}`:""}</p>

<div class="info-card" style="background:${p.bg};border-color:${p.color}">
<div style="font-size:13px;font-weight:700;color:${p.color};margin-bottom:4px">${p.el} Consejo ${p.name}</div>
<p style="font-size:13px;color:#444;line-height:1.5;margin:0;font-style:italic">${pF.tip}</p>
</div>`;

if(r.fus&&sF){
h+=`<div class="info-card" style="background:${s.bg};border-color:${s.color}">
<div style="font-size:13px;font-weight:700;color:${s.color};margin-bottom:4px">${s.el} Consejo ${s.name}</div>
<p style="font-size:13px;color:#444;line-height:1.5;margin:0;font-style:italic">${sF.tip}</p>
</div>`;
}

h+=`<div class="section-title"><span style="font-size:18px">✅</span> Alimentos recomendados</div>`;
pF.good.forEach(i=>{h+=`<div class="item-row"><span class="item-icon">•</span><span>${i}</span></div>`});

if(r.fus&&sF){
const extra=sF.good.filter(f=>!pF.good.includes(f)).slice(0,4);
if(extra.length){
h+=`<div style="height:12px"></div><div style="font-size:12px;color:${s.color};font-weight:600;margin-bottom:6px">${s.el} También por tu ${s.name}:</div>`;
extra.forEach(i=>{h+=`<div class="item-row"><span class="item-icon">•</span><span>${i}</span></div>`});
}}

h+=`<div style="height:20px"></div><div class="section-title"><span style="font-size:18px">🚫</span> Alimentos a evitar</div>`;
pF.avoid.forEach(i=>{h+=`<div class="item-row"><span class="item-icon">✕</span><span>${i}</span></div>`});

if(r.fus&&sF){
const extra=sF.avoid.filter(f=>!pF.avoid.includes(f)).slice(0,4);
if(extra.length){
h+=`<div style="height:12px"></div><div style="font-size:12px;color:${s.color};font-weight:600;margin-bottom:6px">${s.el} También evitar por tu ${s.name}:</div>`;
extra.forEach(i=>{h+=`<div class="item-row"><span class="item-icon">✕</span><span>${i}</span></div>`});
}}

h+=`<div class="tip-box" style="background:#f8f4f0;border-color:#e8e0d8"><div class="tip-title">🎯 Regla de oro</div><p class="tip-text">${pF.rule}</p></div>
</div>`;
}

// === EXERCISE TAB ===
if(S.tab==="ejercicio"){
h+=`<div class="card fade">
<h2 style="font-size:18px;font-weight:800;margin-bottom:4px">🏃 Tu Ejercicio</h2>
<p style="font-size:12px;color:#888;margin-bottom:20px">Actividad física ideal para ${p.name}${r.fus?` con fusión ${s.name}`:""}</p>

<div class="info-card" style="background:${p.bg};border-color:${p.color}">
<div style="font-size:13px;font-weight:700;color:${p.color};margin-bottom:4px">${p.el} Filosofía ${p.name}</div>
<p style="font-size:13px;color:#444;line-height:1.5;margin:0;font-style:italic">${pE.tip}</p>
</div>`;

if(r.fus&&sE){
h+=`<div class="info-card" style="background:${s.bg};border-color:${s.color}">
<div style="font-size:13px;font-weight:700;color:${s.color};margin-bottom:4px">${s.el} Filosofía ${s.name}</div>
<p style="font-size:13px;color:#444;line-height:1.5;margin:0;font-style:italic">${sE.tip}</p>
</div>`;
}

h+=`<div class="section-title"><span style="font-size:18px">✅</span> Actividades recomendadas</div>`;
pE.good.forEach(i=>{h+=`<div class="item-row"><span class="item-icon">•</span><span>${i}</span></div>`});

if(r.fus&&sE){
const extra=sE.good.filter(f=>!pE.good.includes(f)).slice(0,4);
if(extra.length){
h+=`<div style="height:12px"></div><div style="font-size:12px;color:${s.color};font-weight:600;margin-bottom:6px">${s.el} También por tu ${s.name}:</div>`;
extra.forEach(i=>{h+=`<div class="item-row"><span class="item-icon">•</span><span>${i}</span></div>`});
}}

h+=`<div style="height:20px"></div><div class="section-title"><span style="font-size:18px">🚫</span> Actividades a evitar</div>`;
pE.avoid.forEach(i=>{h+=`<div class="item-row"><span class="item-icon">✕</span><span>${i}</span></div>`});

if(r.fus&&sE){
const extra=sE.avoid.filter(f=>!pE.avoid.includes(f)).slice(0,3);
if(extra.length){
h+=`<div style="height:12px"></div><div style="font-size:12px;color:${s.color};font-weight:600;margin-bottom:6px">${s.el} También evitar por tu ${s.name}:</div>`;
extra.forEach(i=>{h+=`<div class="item-row"><span class="item-icon">✕</span><span>${i}</span></div>`});
}}

const compTip=(pk==="S"||sk==="S")?EXER.S.comp:(pk==="F"||sk==="F")?EXER.F.comp:(pk==="M"||sk==="M")?EXER.M.comp:EXER.C.comp;
h+=`<div class="tip-box" style="background:#f0faf0;border-color:#c8e8c8"><div class="tip-title">💡 Complemento ideal</div><p class="tip-text">${compTip}</p></div>
</div>`;
}

// === ACTIONS ===
h+=`<div class="card">
<button class="btn-reset" onclick="reset()">🔄 Repetir test</button>
<button class="btn-wa" onclick="share()">📲 Compartir por WhatsApp</button>
<p class="disc">Test orientativo · Medicina Unani (Dr. David Duarte) · RGP Method (Rodrigo García Platas)<br>No sustituye la valoración de un profesional certificado.</p>
</div>
</div>`;

app.innerHTML=h;
setTimeout(()=>{document.querySelectorAll('.chart-fill').forEach(el=>{const w=el.style.width;el.style.width='0%';setTimeout(()=>{el.style.width=w},50)})},100);
}

function startQuiz(){S={scr:"quiz",cQ:0,ans:{},tab:"resultado"};render();window.scrollTo(0,0)}
function answer(i){
const opt=Q[S.cQ].opts[i];
S.ans[S.cQ]=opt.s;
if(S.cQ<Q.length-1){setTimeout(()=>{S.cQ++;render();window.scrollTo(0,0)},200)}
else{setTimeout(()=>{S.scr="results";S.tab="resultado";render();window.scrollTo(0,0)},300)}
}
function goBack(){if(S.cQ>0){S.cQ--;render();window.scrollTo(0,0)}}
function setTab(t){S.tab=t;render();window.scrollTo(0,0)}
function reset(){S={scr:"start",cQ:0,ans:{},tab:"resultado"};render();window.scrollTo(0,0)}
function share(){
const r=calc(),p=B[r.p[0]],s=B[r.s[0]];
let m=`🧬 *Mi resultado — Test de Biotipos Unani*\n\n${p.el} *${p.name}* (${Math.round((r.p[1]/r.total)*100)}%)\n${p.desc}\n\n`;
if(r.fus)m+=`${s.el} *Secundario: ${s.name}* (${Math.round((r.s[1]/r.total)*100)}%)\n⚡ Fusión ${p.name}-${s.name}\n\n`;
m+=`📊 *Distribución:*\n`;
r.sorted.forEach(([k,v])=>{m+=`${B[k].el} ${B[k].name}: ${Math.round((v/r.total)*100)}%\n`});
m+=`\n🔗 ¡Haz el test tú también!\n`;
const url=window.location.href;
if(url&&!url.startsWith('blob:'))m+=url;
window.open(`https://wa.me/?text=${encodeURIComponent(m)}`,'_blank');
}
render();
</script>
</body>
</html>
